<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mineblock 2.0</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#crosshair {
position:fixed;
top:50%;
left:50%;
width:20px;
height:20px;
margin-left:-10px;
margin-top:-10px;
pointer-events:none;
}
#crosshair:before,#crosshair:after{
content:"";
position:absolute;
background:white;
}
#crosshair:before{
left:9px; top:0; width:2px; height:20px;
}
#crosshair:after{
top:9px; left:0; height:2px; width:20px;
}
</style>
</head>
<body>
<div id="crosshair"></div>
<canvas id="game"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/controls/PointerLockControls.js"></script>

<script>

// BASIC ENGINE SETUP

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("game") });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;

// LIGHTING

const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(100,200,100);
sun.castShadow = true;
scene.add(sun);

scene.add(new THREE.AmbientLight(0xffffff, 0.4));

// CONTROLS

const controls = new THREE.PointerLockControls(camera, document.body);
document.addEventListener("click", () => controls.lock());
scene.add(controls.getObject());

camera.position.set(128, 20, 128);

// WORLD DATA

const CHUNK_SIZE = 64;
const WORLD_SIZE = 128;
const blocks = {};

function key(x,y,z){ return `${x},${y},${z}` }

// TERRAIN GENERATION

function height(x,z){
return Math.floor(5 + Math.sin(x*0.1)*3 + Math.cos(z*0.1)*3);
}

const geometry = new THREE.BoxGeometry(1,1,1);

function createBlock(x,y,z){
const materials = [
new THREE.MeshStandardMaterial({color:0x8B4513}),
new THREE.MeshStandardMaterial({color:0x8B4513}),
new THREE.MeshStandardMaterial({color: y===height(x,z) ? 0x4CAF50 : 0x8B4513}),
new THREE.MeshStandardMaterial({color:0x8B4513}),
new THREE.MeshStandardMaterial({color:0x8B4513}),
new THREE.MeshStandardMaterial({color:0x8B4513})
];
const mesh = new THREE.Mesh(geometry, materials);
mesh.position.set(x,y,z);
mesh.castShadow = true;
mesh.receiveShadow = true;
scene.add(mesh);
blocks[key(x,y,z)] = mesh;
}

for(let x=0;x<WORLD_SIZE;x++){
for(let z=0;z<WORLD_SIZE;z++){
let h = height(x,z);
for(let y=0;y<=h;y++){
createBlock(x,y,z);
}
}
}

// MOVEMENT + PHYSICS

const velocity = new THREE.Vector3();
let canJump=false;
const keys={};

document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

function updateMovement(){
const speed=0.1;

if(keys["KeyW"]) controls.moveForward(speed);
if(keys["KeyS"]) controls.moveForward(-speed);
if(keys["KeyA"]) controls.moveRight(-speed);
if(keys["KeyD"]) controls.moveRight(speed);

velocity.y -= 0.01;

camera.position.y += velocity.y;

if(camera.position.y < 10){
velocity.y = 0;
camera.position.y = 10;
canJump = true;
}

if(keys["Space"] && canJump){
velocity.y = 0.3;
canJump=false;
}
}

// RAYCAST FOR BREAK / PLACE

const raycaster = new THREE.Raycaster();
document.addEventListener("mousedown", e=>{
raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
const intersects = raycaster.intersectObjects(Object.values(blocks));

if(intersects.length>0){
const hit = intersects[0].object;
const pos = hit.position;

if(e.button===0){
scene.remove(hit);
delete blocks[key(pos.x,pos.y,pos.z)];
}
if(e.button===2){
createBlock(pos.x,pos.y+1,pos.z);
}
}
});

// LOOP

function animate(){
requestAnimationFrame(animate);
updateMovement();
renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
