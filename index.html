<!DOCTYPE html><html><head><title>Mineblock</title><style>body{margin:0;overflow:hidden}</style></head><body><canvas id="game"></canvas><script type="module">import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";import { PointerLockControls } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/PointerLockControls.js";const scene=new THREE.Scene();scene.background=new THREE.Color(0x87CEEB);const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("game")});renderer.setSize(window.innerWidth,window.innerHeight);const light=new THREE.DirectionalLight(0xffffff,1);light.position.set(50,100,50);scene.add(light);const ambient=new THREE.AmbientLight(0xffffff,0.3);scene.add(ambient);function createBlock(x,z){const geometry=new THREE.BoxGeometry(1,1,1);const materials=[new THREE.MeshStandardMaterial({color:0x8B4513}),new THREE.MeshStandardMaterial({color:0x8B4513}),new THREE.MeshStandardMaterial({color:0x4CAF50}),new THREE.MeshStandardMaterial({color:0x8B4513}),new THREE.MeshStandardMaterial({color:0x8B4513}),new THREE.MeshStandardMaterial({color:0x8B4513})];const block=new THREE.Mesh(geometry,materials);block.position.set(x,0,z);return block}function createWorld(){const size=64;for(let x=0;x<size;x++){for(let z=0;z<size;z++){scene.add(createBlock(x,z))}}}createWorld();const controls=new PointerLockControls(camera,document.body);document.addEventListener("click",()=>controls.lock());scene.add(controls.getObject());camera.position.set(32,2,80);const keys={};document.addEventListener("keydown",e=>keys[e.code]=true);document.addEventListener("keyup",e=>keys[e.code]=false);function move(){const speed=0.1;if(keys["KeyW"])controls.moveForward(speed);if(keys["KeyS"])controls.moveForward(-speed);if(keys["KeyA"])controls.moveRight(-speed);if(keys["KeyD"])controls.moveRight(speed)}function animate(){requestAnimationFrame(animate);move();renderer.render(scene,camera)}animate();window.addEventListener("resize",()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)})</script></body></html>
